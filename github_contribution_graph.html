<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Contributions</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #21262d;
        --text-primary: #c9d1d9;
        --text-muted: #8b949e;
        --green-0: #161b22;
        --green-1: #0e4429;
        --green-2: #196530;
        --green-3: #2ea043;
        --green-4: #39d353;
        --cell-size: 11px;
        --cell-gap: 3px;
        --radius: 2px;
      }

      html,
      body {
        background: transparent;
        font-family: 'JetBrains Mono', monospace;
        color: var(--text-primary);
        font-size: 11px;
        overflow: hidden;
        margin: 0;
        padding: 0;
        width: 100%;
      }

      #app {
        padding: 12px 16px 10px;
        background: transparent;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .username {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.05em;
      }

      .username span {
        color: var(--green-4);
      }

      .count {
        font-size: 11px;
        color: var(--text-muted);
      }

      .graph-wrapper {
        overflow: hidden;
      }

      .graph {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .months-row {
        display: flex;
        margin-left: 28px;
        margin-bottom: 4px;
      }

      .month-label {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .grid-row {
        display: flex;
        align-items: flex-start;
      }

      .day-labels {
        display: flex;
        flex-direction: column;
        margin-right: 4px;
        width: 22px;
        flex-shrink: 0;
      }

      .day-label {
        font-size: 9px;
        color: var(--text-muted);
        line-height: calc(var(--cell-size) + var(--cell-gap));
        text-align: right;
        padding-right: 4px;
        letter-spacing: 0.02em;
      }

      .weeks {
        display: flex;
        gap: var(--cell-gap);
      }

      .week {
        display: flex;
        flex-direction: column;
        gap: var(--cell-gap);
      }

      .cell {
        width: var(--cell-size);
        height: var(--cell-size);
        border-radius: var(--radius);
        cursor: pointer;
        transition:
          opacity 0.15s ease,
          transform 0.1s ease;
        position: relative;
      }

      .cell:hover {
        opacity: 0.85;
        transform: scale(1.25);
        z-index: 10;
      }

      .cell[data-level='0'] {
        background: var(--green-0);
        border: 1px solid var(--border);
      }
      .cell[data-level='1'] {
        background: var(--green-1);
      }
      .cell[data-level='2'] {
        background: var(--green-2);
      }
      .cell[data-level='3'] {
        background: var(--green-3);
      }
      .cell[data-level='4'] {
        background: var(--green-4);
      }

      .cell.empty {
        background: transparent;
        border: none;
        pointer-events: none;
      }

      /* Tooltip */
      .tooltip {
        position: fixed;
        background: #1c2128;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 5px 8px;
        font-size: 10px;
        color: var(--text-primary);
        pointer-events: none;
        z-index: 1000;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.1s;
        font-family: 'JetBrains Mono', monospace;
      }

      .tooltip.visible {
        opacity: 1;
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 8px;
        justify-content: flex-end;
      }

      .legend-label {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.03em;
      }

      .legend-cell {
        width: 9px;
        height: 9px;
        border-radius: 1px;
      }

      .loading {
        color: var(--text-muted);
        font-size: 11px;
        padding: 20px 0;
        text-align: center;
        letter-spacing: 0.05em;
      }

      .error {
        color: #f85149;
        font-size: 10px;
        padding: 8px 0;
        letter-spacing: 0.03em;
      }

      /* Fade in animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .graph {
        animation: fadeIn 0.3s ease forwards;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="header">
        <div class="username">contributions — <span>JacobCoch</span></div>
        <div class="count" id="total-count"></div>
      </div>
      <div id="graph-container">
        <div class="loading">fetching contributions...</div>
      </div>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
      const USERNAME = 'JacobCoch';
      const PROXY = `https://github-contributions-api.jogruber.de/v4/${USERNAME}?y=last`;

      const MONTHS = [
        'Jan',
        'Feb',
        'Mar',
        'Apr',
        'May',
        'Jun',
        'Jul',
        'Aug',
        'Sep',
        'Oct',
        'Nov',
        'Dec',
      ];
      const DAYS = ['', 'Mon', '', 'Wed', '', 'Fri', ''];

      const tooltip = document.getElementById('tooltip');

      function levelFromCount(count) {
        if (count === 0) return 0;
        if (count <= 2) return 1;
        if (count <= 5) return 2;
        if (count <= 9) return 3;
        return 4;
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', {
          weekday: 'short',
          month: 'short',
          day: 'numeric',
          year: 'numeric',
        });
      }

      function buildGraph(contributions) {
        // contributions: array of { date: "YYYY-MM-DD", count: N }
        // Group into weeks (Sun-Sat), pad start
        const byDate = {};
        let total = 0;
        contributions.forEach((c) => {
          byDate[c.date] = c.count;
          total += c.count;
        });

        document.getElementById('total-count').textContent =
          `${total.toLocaleString()} contributions in the last year`;

        // Build 52-week grid ending today
        const today = new Date();
        const endDate = new Date(today);
        // Go to end of current week (Saturday)
        const dayOfWeek = endDate.getDay(); // 0=Sun
        endDate.setDate(endDate.getDate() + (6 - dayOfWeek));

        const startDate = new Date(endDate);
        startDate.setDate(startDate.getDate() - 52 * 7 + 1);
        // Align to Sunday
        startDate.setDate(startDate.getDate() - startDate.getDay());

        // Build weeks array
        const weeks = [];
        let current = new Date(startDate);
        while (current <= endDate) {
          const week = [];
          for (let d = 0; d < 7; d++) {
            const dateStr = current.toISOString().split('T')[0];
            week.push({
              date: dateStr,
              count: byDate[dateStr] || 0,
              future: current > today,
            });
            current.setDate(current.getDate() + 1);
          }
          weeks.push(week);
        }

        // Reverse so most recent week is first (leftmost)
        weeks.reverse();

        // Build month labels — show label when month changes going left-to-right (reversed)
        const monthsRow = document.createElement('div');
        monthsRow.className = 'months-row';
        let lastMonth = -1;
        weeks.forEach((week) => {
          const span = document.createElement('div');
          span.style.width = `calc(${11 + 3}px)`;
          span.style.flexShrink = '0';
          // Use last day of week so the label appears at the start of that month's column
          const repDay = new Date(week[week.length - 1].date + 'T00:00:00');
          const month = repDay.getMonth();
          if (month !== lastMonth) {
            span.className = 'month-label';
            span.textContent = MONTHS[month];
            lastMonth = month;
          }
          monthsRow.appendChild(span);
        });

        // Build grid
        const gridRow = document.createElement('div');
        gridRow.className = 'grid-row';

        const dayLabels = document.createElement('div');
        dayLabels.className = 'day-labels';
        DAYS.forEach((d) => {
          const lbl = document.createElement('div');
          lbl.className = 'day-label';
          lbl.textContent = d;
          dayLabels.appendChild(lbl);
        });

        const weeksEl = document.createElement('div');
        weeksEl.className = 'weeks';

        weeks.forEach((week) => {
          const weekEl = document.createElement('div');
          weekEl.className = 'week';
          week.forEach((day) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (day.future) {
              cell.classList.add('empty');
            } else {
              cell.dataset.level = levelFromCount(day.count);
              cell.dataset.date = day.date;
              cell.dataset.count = day.count;

              cell.addEventListener('mouseenter', (e) => {
                const label =
                  day.count === 0
                    ? `No contributions on ${formatDate(day.date)}`
                    : `${day.count} contribution${day.count > 1 ? 's' : ''} on ${formatDate(day.date)}`;
                tooltip.textContent = label;
                tooltip.classList.add('visible');
              });
              cell.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.clientX + 12 + 'px';
                tooltip.style.top = e.clientY - 28 + 'px';
              });
              cell.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
              });
            }
            weekEl.appendChild(cell);
          });
          weeksEl.appendChild(weekEl);
        });

        gridRow.appendChild(dayLabels);
        gridRow.appendChild(weeksEl);

        // Legend
        const legend = document.createElement('div');
        legend.className = 'legend';
        const lessLbl = document.createElement('div');
        lessLbl.className = 'legend-label';
        lessLbl.textContent = 'less';
        legend.appendChild(lessLbl);
        [0, 1, 2, 3, 4].forEach((l) => {
          const lc = document.createElement('div');
          lc.className = 'legend-cell cell';
          lc.dataset.level = l;
          legend.appendChild(lc);
        });
        const moreLbl = document.createElement('div');
        moreLbl.className = 'legend-label';
        moreLbl.textContent = 'more';
        legend.appendChild(moreLbl);

        const graph = document.createElement('div');
        graph.className = 'graph';
        graph.appendChild(monthsRow);
        graph.appendChild(gridRow);
        graph.appendChild(legend);

        document.getElementById('graph-container').innerHTML = '';
        document.getElementById('graph-container').appendChild(graph);
      }

      async function fetchContributions() {
        try {
          const res = await fetch(PROXY);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          // API returns { contributions: [...] }
          buildGraph(data.contributions || []);
        } catch (err) {
          document.getElementById('graph-container').innerHTML =
            `<div class="error">failed to load contributions: ${err.message}</div>`;
        }
      }

      fetchContributions();
    </script>
  </body>
</html>
